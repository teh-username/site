<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="HandheldFriendly" content="True">

  <title>{{ if .IsHome }}{{ .Site.Params.author }} | {{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Open Graph -->
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:locale" content="en_US">
  {{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}">{{ end }}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sono:wght@500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Plausible Analytics (proxied) -->
  {{ if .Site.Params.plausible.enabled }}
  <script defer data-api="/lfmhy/api/event" src="/lfmhy/js/script.js"></script>
  {{ end }}

  <!-- Google Analytics -->
  {{ if .Site.Params.google_analytics.enabled }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.google_analytics.id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ .Site.Params.google_analytics.id }}');
  </script>
  {{ end }}
</head>
<body class="{{ if .IsPage }}page-post{{ else if .IsHome }}page-home{{ else }}page-list{{ end }}">
  <div class="container">
    <header>
      <a class="site-name" href="/">{{ .Site.Title }}</a>
      <nav>
        <a href="/"{{ if .IsHome }} class="active"{{ end }}>Home</a>
        <a href="/about/"{{ if eq .RelPermalink "/about/" }} class="active"{{ end }}>About</a>
      </nav>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer>
      <p>© 2016–{{ now.Format "2006" }} {{ .Site.Params.author }}</p>
    </footer>
  </div>
</body>
</html>
