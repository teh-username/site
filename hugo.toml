baseURL = "https://www.laroberto.com"
languageCode = "en-us"
title = "Works on localhost"


[params]
  author = "LA Roberto"
  description = "Overengineering software, one broken build at a time."
  tagline = "Overengineering software, one broken build at a time."
  github = "https://github.com/teh-username"

  # Analytics hooks — set enabled = true and fill in the id to activate
  [params.plausible]
    enabled = false
    # Plausible is proxied through Netlify at /lfmhy/ — no domain needed here
    # Set enabled = true to activate the script tag in baseof.html

  [params.google_analytics]
    enabled = false
    id = ""

[taxonomies]
  tag = "tags"

[permalinks]
  posts = "/:slug/"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    tabWidth = 2
  [markup.goldmark.renderer]
    unsafe = true  # allows raw HTML in markdown (e.g. images with titles)
